services:
  # Backend Service (Node.js)
  - type: web
    name: missing-person-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FIREBASE_PROJECT_ID
        value: finalyearprojectdata-80bc9
      - key: FIREBASE_DATABASE_URL
        value: https://finalyearprojectdata-80bc9-default-rtdb.firebaseio.com
      - key: FIREBASE_STORAGE_BUCKET
        value: finalyearprojectdata-80bc9.firebasestorage.app
      - key: FIREBASE_CLIENT_EMAIL
        sync: false # Set Firebase Admin service-account client_email in Render Dashboard
      - key: FIREBASE_PRIVATE_KEY
        sync: false # Set Firebase Admin service-account private_key in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://missingpersonfinder.netlify.app
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: missing-person-ai-service
          property: url

  # AI Service (Python)
  - type: web
    name: missing-person-ai-service
    env: python
    rootDir: ai-service
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
    plan: free # Note: AI models might be heavy for free tier, but good for starting
