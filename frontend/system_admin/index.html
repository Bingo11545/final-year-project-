<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin - Registration Review</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-user-shield" style="color:white; font-size:0.9rem;"></i></div>
            <a href="../index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">
                Find Missing <span class="highlight">Person</span>
            </a>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
                <i class="fas fa-sun"></i>
            </button>
            <div id="nav-right"></div>
        </div>
    </nav>

    <div class="container" style="margin-top:2rem; margin-bottom:3rem;">
        <div class="section-header" style="margin-bottom:1rem;">
            <h2 style="font-family:var(--font-heading); font-size:1.5rem; margin:0;">System Admin: Police Registration Approval</h2>
        </div>

        <p style="color:var(--text-secondary); margin-bottom:1.2rem;">Review ID documents and approve or reject law enforcement and authorized organization registrations.</p>

        <div id="pending-list" class="grid-container">
            <div class="loading-indicator" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <span>Loading pending registrations...</span>
            </div>
        </div>
    </div>

    <script src="../app.js"></script>
    <script>
        updateNav();
        checkAuth();

        if (getUserRole() !== 'admin') {
            window.location.href = '../login.html';
        }

        async function loadPendingRegistrations() {
            const listEl = document.getElementById('pending-list');
            listEl.innerHTML = '<div class="loading-indicator" style="grid-column:1/-1;"><div class="spinner"></div><span>Loading pending registrations...</span></div>';

            try {
                const users = await apiCall('/auth/pending-registrations');

                if (!users.length) {
                    listEl.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-secondary);">No pending registrations.</div>';
                    return;
                }

                listEl.innerHTML = '';

                users.forEach((u) => {
                    const card = document.createElement('div');
                    card.className = 'person-card';

                    const docLink = u.verificationDocument
                        ? `${BACKEND_ORIGIN}/${u.verificationDocument}`
                        : '';

                    card.innerHTML = `
                        <div class="info" style="padding-top:18px;">
                            <h3 style="margin-bottom:8px;">${u.username}</h3>
                            <div class="card-meta" style="margin-bottom:10px;">
                                <span><strong>Email:</strong> ${u.email}</span>
                                <span><strong>Role:</strong> ${u.role}</span>
                                <span><strong>Organization:</strong> ${u.organizationName || 'N/A'}</span>
                                <span><strong>Submitted:</strong> ${new Date(u.createdAt).toLocaleString()}</span>
                            </div>
                            ${docLink ? `<a href="${docLink}" target="_blank" rel="noopener noreferrer" class="btn btn-sm" style="margin-bottom:10px; display:inline-flex;"><i class="fas fa-file-alt"></i><span>View ID Document</span></a>` : '<p style="color:#f87171;">No document uploaded</p>'}
                            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                <button class="btn btn-sm" style="background:#16a34a; border:none;" onclick="approveRegistration('${u._id}')">
                                    <i class="fas fa-check"></i><span>Approve</span>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="rejectRegistration('${u._id}')">
                                    <i class="fas fa-xmark"></i><span>Reject</span>
                                </button>
                            </div>
                        </div>
                    `;

                    listEl.appendChild(card);
                });
            } catch (err) {
                listEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; color:#f87171;">Failed to load pending registrations: ${err.message}</div>`;
            }
        }

        async function approveRegistration(userId) {
            try {
                await apiCall(`/auth/registrations/${userId}/approve`, 'PUT', {});
                alert('Registration approved. User has been notified.');
                loadPendingRegistrations();
            } catch (err) {
                alert('Approve failed: ' + err.message);
            }
        }

        async function rejectRegistration(userId) {
            const reason = prompt('Provide rejection reason (optional):') || '';

            try {
                await apiCall(`/auth/registrations/${userId}/reject`, 'PUT', { reason });
                alert('Registration rejected. User has been notified to resubmit.');
                loadPendingRegistrations();
            } catch (err) {
                alert('Reject failed: ' + err.message);
            }
        }

        loadPendingRegistrations();
    </script>
</body>
</html>
