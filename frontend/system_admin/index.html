<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin - Registration Review</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../theme.js"></script>
    <style>
        .admin-user-card {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 18px;
        }

        .admin-user-photo {
            width: 140px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            background: #0f172a;
        }

        .admin-user-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px 14px;
            margin: 8px 0 14px;
            font-size: 0.98rem;
            line-height: 1.5;
        }

        .admin-photo-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 16px;
        }

        .admin-photo-modal img {
            max-width: min(90vw, 560px);
            max-height: 85vh;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            object-fit: contain;
            background: #111827;
        }

        @media (max-width: 760px) {
            .admin-user-card {
                grid-template-columns: 1fr;
            }

            .admin-user-photo {
                width: 100%;
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-user-shield" style="color:white; font-size:0.9rem;"></i></div>
            <a href="../index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">
                Find Missing <span class="highlight">Person</span>
            </a>
        </div>

        <div class="nav-tools">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
                <i class="fas fa-sun"></i>
            </button>
            <div id="nav-right"></div>
        </div>
    </nav>

    <div class="container page-shell">
        <div class="section-header" style="margin-bottom:1rem;">
            <h2 class="section-title-modern" data-key="admin_title">System Admin: Police Registration Approval</h2>
        </div>

        <p class="text-muted" style="margin-bottom:1.2rem;" data-key="admin_desc">Review ID documents and approve or reject law enforcement and authorized organization registrations.</p>

        <div id="pending-list" class="grid-container">
            <div class="loading-indicator loading-full">
                <div class="spinner"></div>
                <span data-key="admin_loading">Loading pending registrations...</span>
            </div>
        </div>
    </div>

    <div id="photo-modal" class="admin-photo-modal" onclick="closePhotoModal()">
        <img id="photo-modal-image" src="" alt="Registration photo preview">
    </div>

    <script src="../translations.js"></script>
    <script src="../app.js"></script>
    <script>
        updateNav();
        checkAuth();

        const getAdminText = (key, fallback) => {
            const lang = localStorage.getItem('preferredLanguage') || 'en';
            const active = (translations && translations[lang]) || translations.en;
            return active[key] || fallback;
        };

        const na = () => getAdminText('not_available', 'N/A');

        if (getUserRole() !== 'admin') {
            window.location.href = '../login.html';
        }

        async function loadPendingRegistrations() {
            const listEl = document.getElementById('pending-list');
            listEl.innerHTML = `<div class="loading-indicator loading-full"><div class="spinner"></div><span>${getAdminText('admin_loading', 'Loading pending registrations...')}</span></div>`;

            try {
                const users = await apiCall('/auth/pending-registrations');

                if (!users.length) {
                    listEl.innerHTML = `<div class="empty-state loading-full">${getAdminText('admin_no_pending', 'No pending registrations.')}</div>`;
                    return;
                }

                listEl.innerHTML = '';

                users.forEach((u) => {
                    const card = document.createElement('div');
                    card.className = 'admin-user-card';

                    const docLink = u.verificationDocument
                        ? `${BACKEND_ORIGIN}/${u.verificationDocument}`
                        : '';

                    const profilePhoto = u.profilePhoto
                        ? `${BACKEND_ORIGIN}/${u.profilePhoto}`
                        : '';

                    const safePhoto = profilePhoto || 'https://via.placeholder.com/320x360?text=No+Photo';

                    card.innerHTML = `
                        <img src="${safePhoto}" alt="${u.username} photo" class="admin-user-photo" onclick="openPhotoModal('${safePhoto}')">
                        <div class="info" style="padding-top:4px;">
                            <h3 style="margin-bottom:8px; font-size:1.25rem;">${u.username}</h3>
                            <div class="admin-user-meta">
                                <span><strong>${getAdminText('admin_email', 'Email')}:</strong> ${u.email}</span>
                                <span><strong>${getAdminText('admin_role', 'Role')}:</strong> ${u.role}</span>
                                <span><strong>${getAdminText('admin_org', 'Organization')}:</strong> ${u.organizationName || na()}</span>
                                <span><strong>${getAdminText('admin_station', 'Station')}:</strong> ${u.station || na()}</span>
                                <span><strong>${getAdminText('admin_dob', 'Date of Birth')}:</strong> ${u.dateOfBirth || na()}</span>
                                <span><strong>${getAdminText('admin_id_service', 'ID / Service Number')}:</strong> ${u.idNumber || na()}</span>
                                <span><strong>${getAdminText('admin_submitted', 'Submitted')}:</strong> ${new Date(u.createdAt).toLocaleString()}</span>
                            </div>
                            ${docLink ? `<a href="${docLink}" target="_blank" rel="noopener noreferrer" class="btn btn-sm" style="margin-bottom:10px; display:inline-flex;"><i class="fas fa-file-alt"></i><span>${getAdminText('admin_view_id_doc', 'View ID Document')}</span></a>` : `<p class="error-inline">${getAdminText('admin_no_doc', 'No document uploaded')}</p>`}
                            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                <button class="btn btn-sm" style="background:#16a34a; border:none;" onclick="approveRegistration('${u._id}')">
                                    <i class="fas fa-check"></i><span>${getAdminText('admin_approve', 'Approve')}</span>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="rejectRegistration('${u._id}')">
                                    <i class="fas fa-xmark"></i><span>${getAdminText('admin_reject', 'Reject')}</span>
                                </button>
                            </div>
                        </div>
                    `;

                    listEl.appendChild(card);
                });
            } catch (err) {
                listEl.innerHTML = `<div class="error-state loading-full">${getAdminText('admin_load_failed', 'Failed to load pending registrations')}: ${err.message}</div>`;
            }
        }

        async function approveRegistration(userId) {
            try {
                await apiCall(`/auth/registrations/${userId}/approve`, 'PUT', {});
                showToast(getAdminText('admin_approved_success', 'Registration approved. User has been notified.'), 'success');
                loadPendingRegistrations();
            } catch (err) {
                showToast(`${getAdminText('admin_approve_failed', 'Approve failed')}: ${err.message}`, 'error');
            }
        }

        async function rejectRegistration(userId) {
            const reason = prompt(getAdminText('admin_reject_prompt', 'Provide rejection reason (optional):')) || '';

            try {
                await apiCall(`/auth/registrations/${userId}/reject`, 'PUT', { reason });
                showToast(getAdminText('admin_rejected_success', 'Registration rejected. User has been notified to resubmit.'), 'success');
                loadPendingRegistrations();
            } catch (err) {
                showToast(`${getAdminText('admin_reject_failed', 'Reject failed')}: ${err.message}`, 'error');
            }
        }

        function openPhotoModal(url) {
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('photo-modal-image');
            img.src = url;
            modal.style.display = 'flex';
        }

        function closePhotoModal() {
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('photo-modal-image');
            modal.style.display = 'none';
            img.src = '';
        }

        loadPendingRegistrations();
        changeLanguage(localStorage.getItem('preferredLanguage') || 'en');
    </script>
</body>
</html>
