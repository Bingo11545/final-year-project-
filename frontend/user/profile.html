<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <title>Case Details — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="theme.js"></script>
    <style>
        .profile-header {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            border-radius: 18px;
            box-shadow: var(--shadow-card);
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        [data-theme="light"] .profile-header {
            background: #fff;
            border-color: rgba(0,0,0,0.07);
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        .profile-img {
            max-width: 300px;
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
        .profile-info {
            flex: 1;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .info-item label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0;
        }
        [data-theme="light"] .info-item label { color: #374151; }
        .info-item span {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        [data-theme="light"] .info-item span { color: #0f172a; }
        .police-badge {
            background: rgba(59,130,246,0.12);
            color: var(--accent-teal);
            border: 1px solid rgba(59,130,246,0.2);
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        [data-theme="light"] .police-badge {
            background: rgba(29,78,216,0.06);
            color: #1d4ed8;
            border-color: rgba(29,78,216,0.15);
        }
        .tip-box {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 2rem;
            margin-top: 2rem;
            border-radius: 18px;
            text-align: center;
        }
        [data-theme="light"] .tip-box {
            background: #fff;
            border-color: rgba(0,0,0,0.07);
        }
        .tip-box h2 { color: var(--text-primary); }
        [data-theme="light"] .tip-box h2 { color: #0f172a; }
        .tip-box p { color: var(--text-secondary); }
        [data-theme="light"] .tip-box p { color: #374151; }
        #loading { color: var(--text-secondary); padding: 4rem; text-align: center; font-size: 1rem; }
        [data-theme="light"] #loading { color: #374151; }
        h1 { color: var(--text-primary); }
        [data-theme="light"] h1 { color: #0f172a; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">Find Missing <span class="highlight">Person</span></a>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
             <select id="languageSelector" style="margin-right: 1rem; padding: 0.5rem; border-radius: 5px;">
                <option value="en">English</option>
                <option value="am">Amharic</option>
                <option value="om">Oromo</option>
                <option value="ti">Tigrinya</option>
             </select>
            <div id="nav-right"></div>
        </div>
    </nav>

    <div class="container">
        
        <div id="loading">Loading Case Details...</div>

        <div id="profileContent" style="display:none;">
            <div class="profile-header">
                <div>
                    <img id="p-img" src="" alt="Missing Person" class="profile-img">
                </div>
                <div class="profile-info">
                    <div id="p-police-verified" class="police-badge" style="display:none;">👮 Verified Police Case</div>
                    <h1 id="p-name" style="margin-top:0;">Name</h1>
                    <p id="p-status" style="display:inline-block; padding:5px 10px; border-radius:4px; font-weight:bold; color:white;">Status</p>
                    
                    <div class="info-grid">
                        <div class="info-item"><label>Age</label><span id="p-age">-</span></div>
                        <div class="info-item"><label>Gender</label><span id="p-gender">-</span></div>
                        <div class="info-item"><label>Last Seen Date</label><span id="p-seen-date">-</span></div>
                        <div class="info-item"><label>City</label><span id="p-city">-</span></div>
                        <div class="info-item"><label>Police Dept</label><span id="p-dept">-</span></div>
                        <div class="info-item"><label>Case Number</label><span id="p-case">-</span></div>
                    </div>

                    <div style="margin-top: 20px;">
                        <label>Last Seen Location</label>
                        <p id="p-seen-loc">-</p>
                    </div>

                    <div style="margin-top: 20px;">
                        <label>Description</label>
                        <p id="p-desc">-</p>
                    </div>

                    <div style="margin-top: 20px;">
                        <label>Vehicle Info</label>
                        <p id="p-vehicle">-</p>
                    </div>

                    <div style="margin-top: 20px;">
                        <label>Social Media</label>
                        <p id="p-social">-</p>
                    </div>
                </div>
            </div>

            <!-- TIP SECTION -->
            <div class="tip-box">
                <h2>📢 Have Information?</h2>
                <p>If you have seen this person or have any information, please submit a tip immediately.</p>
                <form id="tipForm" style="max-width: 500px; margin: 0 auto; text-align: left;">
                    <div class="form-group">
                        <textarea id="tipMessage" rows="4" placeholder="Describe what you saw or know..." required></textarea>
                    </div>
                     <div class="form-group">
                        <input type="text" id="tipContact" placeholder="Your Contact Info (Optional)">
                    </div>
                    <button type="submit" class="btn btn-danger" style="width:100%;">Send Tip / Provide Update</button>
                    <p style="font-size:0.8rem; margin-top:10px; color:#666;">Tips may be forwarded to law enforcement.</p>
                </form>
            </div>
        </div>

    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        updateNav();

        const params = new URLSearchParams(window.location.search);
        const personId = params.get('id');

        if(!personId) {
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            try {
                // Since we don't have a single person get endpoint, we filter from list or use separate text
                // Ideally, we should implement GET /api/people/:id
                // For now, let's look for search by ID or just fetch all and find (inefficient but works for prototype)
                
                // Let's implement GET /:id in backend quickly? 
                // Wait, I can try to find from the public feed endpoint if I just search by name?
                // Let's assume we implement the endpoint or reuse logic.
                
                // Better: Implement a specific GET ONE endpoint in backend, but I am editing frontend now.
                // Let's use the list for now if I can't edit backend again immediately. 
                // Actually, I can edit backend. I will add GET /:id.

                const res = await fetch(`${API_URL}/people/${personId}`);
                if (!res.ok) throw new Error('Person not found');
                const person = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('profileContent').style.display = 'block';

                document.getElementById('p-name').innerText = person.fullName;
                document.getElementById('p-img').src = person.images && person.images.length > 0 ? IMG_URL_BASE + person.images[0].url : 'https://via.placeholder.com/300';
                
                const statusElem = document.getElementById('p-status');
                statusElem.innerText = person.status;
                statusElem.style.backgroundColor = person.status === 'Missing' ? '#dc3545' : '#28a745';

                document.getElementById('p-age').innerText = person.age || 'N/A';
                document.getElementById('p-gender').innerText = person.gender || 'N/A';
                document.getElementById('p-seen-date').innerText = person.lastSeenDate ? new Date(person.lastSeenDate).toLocaleDateString() : 'N/A';
                document.getElementById('p-city').innerText = person.city || 'N/A';
                document.getElementById('p-seen-loc').innerText = person.lastSeenLocation || 'N/A';
                document.getElementById('p-desc').innerText = person.description || 'No description provided';
                
                 // New Fields
                document.getElementById('p-dept').innerText = person.policeDistrict || 'Not Listed';
                document.getElementById('p-case').innerText = person.policeCaseNumber || 'Not Listed';
                document.getElementById('p-vehicle').innerText = person.vehicleInformation || 'None';
                document.getElementById('p-social').innerText = person.socialMediaAccounts || 'None';

                if(person.isPoliceReported) {
                    document.getElementById('p-police-verified').style.display = 'inline-block';
                }

            } catch (err) {
                document.getElementById('loading').innerText = 'Case not found.';
            }
        }

        document.getElementById('tipForm').addEventListener('submit', async(e) => {
            e.preventDefault();
            alert("Thank you. Your tip has been submitted to our system and will be reviewed.");
            document.getElementById('tipForm').reset();
            // In a real app, this would POST to /api/people/:id/tips
        });

        loadProfile();
    </script>
</body>
</html>
