<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>My Reports - Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile-menu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="theme.js"></script>
    <style>
        .my-reports-wrap { padding: 2rem 0 3rem; }
        .my-reports-head { margin-bottom: 1.5rem; }
        .my-reports-head h2 { margin: 0 0 0.4rem; }
        .my-reports-grid { display: grid; gap: 16px; }
        .my-report-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            padding: 16px;
        }
        .my-report-top {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 14px;
            margin-bottom: 12px;
        }
        .my-report-img {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid var(--border-subtle);
            background: #0f172a;
        }
        .my-report-meta { display: grid; gap: 6px; }
        .my-report-meta span { display: block; overflow-wrap: anywhere; }
        .my-report-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .my-report-actions textarea,
        .my-report-actions input,
        .my-report-actions select {
            width: 100%;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 10px;
            font: inherit;
        }
        .my-report-notes {
            margin-top: 12px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 12px;
            display: grid;
            gap: 8px;
        }
        .my-report-requests {
            margin-top: 12px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 12px;
            display: grid;
            gap: 8px;
        }
        .my-request-item {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.24);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.88rem;
        }
        .my-note-item {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
        }
        .my-note-item .meta {
            display: block;
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        @media (max-width: 700px) {
            .my-report-top { grid-template-columns: 1fr; }
            .my-report-img { height: 180px; }
        }
    </style>
</head>
<body>
    <nav class="fm-desktop-nav">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-file-alt" style="color:white; font-size:0.9rem;"></i></div>
            <a href="/index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">
                Find Missing <span class="highlight">Person</span>
            </a>
        </div>
        <div class="nav-tools">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
            <a href="/user/dashboard.html" class="btn btn-sm">Dashboard</a>
            <a href="/user/report.html" class="btn btn-danger btn-sm"><i class="fas fa-plus"></i> New Report</a>
            <div id="nav-right"></div>
        </div>
    </nav>

    <div class="container my-reports-wrap">
        <div class="my-reports-head">
            <h2 class="section-title-modern"><i class="fas fa-folder-open"></i> My Reports</h2>
            <p class="text-muted">View your reported cases, update details, and add comments or tips to your own reports.</p>
        </div>
        <div id="my-reports-list" class="my-reports-grid">
            <div class="loading-indicator loading-full"><div class="spinner"></div><span>Loading your reports...</span></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script src="mobile-menu.js"></script>
    <script>
        updateNav();
        checkAuth();

        if (getUserRole() === 'admin') {
            window.location.href = '/system_admin/index.html';
        }
        if (getUserRole() === 'law_enforcement') {
            window.location.href = '/police_admin/my-reports.html';
        }

        function e(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function asDate(value) {
            if (!value) return 'N/A';
            const d = new Date(value);
            return Number.isNaN(d.getTime()) ? 'N/A' : d.toLocaleString();
        }

        function mapRequestsByPerson(requests) {
            const grouped = {};
            (requests || []).forEach((request) => {
                const key = request.personId;
                if (!key) return;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(request);
            });

            Object.keys(grouped).forEach((personId) => {
                grouped[personId].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            });

            return grouped;
        }

        function renderRequestHistory(requests) {
            if (!requests || !requests.length) {
                return '<div class="text-muted">No update requests submitted yet.</div>';
            }

            return requests.slice(0, 3).map((request) => {
                const status = String(request.status || 'pending');
                const reason = request.reviewReason ? ` | Reason: ${e(request.reviewReason)}` : '';
                return `
                    <div class="my-request-item">
                        <div><strong>Request Status:</strong> ${e(status.toUpperCase())}</div>
                        <div><strong>Submitted:</strong> ${asDate(request.createdAt)}</div>
                        <div><strong>Reviewed:</strong> ${asDate(request.reviewedAt)}</div>
                        <div><strong>Reviewed By:</strong> ${e(request.reviewedByUser?.username || 'Pending')}</div>
                        ${reason ? `<div>${reason}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function loadNotes(reportId) {
            const holder = document.getElementById(`notes-${reportId}`);
            if (!holder) return;

            try {
                const notes = await apiCall(`/tips/person/${reportId}`);
                if (!notes.length) {
                    holder.innerHTML = '<div class="text-muted">No comments/tips yet.</div>';
                    return;
                }

                holder.innerHTML = notes.map((note) => `
                    <div class="my-note-item">
                        <div><strong>${e(note.noteType || 'comment')}:</strong> ${e(note.message)}</div>
                        <span class="meta">${e(note.author?.username || note.reporterName || 'Unknown')} (${e(note.author?.role || 'user')}) • ${asDate(note.createdAt)}</span>
                    </div>
                `).join('');
            } catch (err) {
                holder.innerHTML = `<div class="text-muted">Failed to load notes: ${e(err.message)}</div>`;
            }
        }

        async function submitNote(reportId) {
            const msgEl = document.getElementById(`note-msg-${reportId}`);
            const typeEl = document.getElementById(`note-type-${reportId}`);
            const message = (msgEl?.value || '').trim();
            const noteType = typeEl?.value || 'comment';

            if (!message) {
                showToast('Please enter a message before sending.', 'warning');
                return;
            }

            try {
                await apiCall(`/tips/person/${reportId}`, 'POST', { message, noteType });
                msgEl.value = '';
                showToast('Note added successfully.', 'success');
                loadNotes(reportId);
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function saveReport(reportId) {
            const description = (document.getElementById(`edit-desc-${reportId}`)?.value || '').trim();
            const city = (document.getElementById(`edit-city-${reportId}`)?.value || '').trim();
            const classification = (document.getElementById(`edit-class-${reportId}`)?.value || '').trim();
            const reason = (document.getElementById(`edit-reason-${reportId}`)?.value || '').trim();

            try {
                const result = await apiCall(`/people/${reportId}`, 'PUT', {
                    description,
                    city,
                    classification,
                    reason
                });

                if (result?.request) {
                    showToast('Update request sent to police admin for review.', 'success');
                } else {
                    showToast('Report updated successfully.', 'success');
                }
                loadMyReports();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function loadMyReports() {
            const list = document.getElementById('my-reports-list');
            list.innerHTML = '<div class="loading-indicator loading-full"><div class="spinner"></div><span>Loading your reports...</span></div>';

            try {
                const [reports, updateRequests] = await Promise.all([
                    apiCall('/people/my-reports'),
                    apiCall('/people/update-requests/mine')
                ]);
                const requestMap = mapRequestsByPerson(updateRequests || []);
                if (!reports.length) {
                    list.innerHTML = '<div class="empty-state loading-full">You have not submitted any report yet.</div>';
                    return;
                }

                list.innerHTML = reports.map((r) => {
                    const img = (r.images && r.images[0]) ? `${IMG_URL_BASE}${r.images[0].url}` : 'https://via.placeholder.com/360x220/131c35/4a5568?text=No+Photo';
                    return `
                        <article class="my-report-card">
                            <div class="my-report-top">
                                <img class="my-report-img" src="${img}" alt="${e(r.fullName)}">
                                <div class="my-report-meta">
                                    <span><strong>Name:</strong> ${e(r.fullName || 'N/A')}</span>
                                    <span><strong>Status:</strong> ${e(r.status || 'N/A')}</span>
                                    <span><strong>Case #:</strong> ${e(r.policeCaseNumber || 'N/A')}</span>
                                    <span><strong>Submitted:</strong> ${asDate(r.createdAt)}</span>
                                    <span><strong>Last Updated:</strong> ${asDate(r.updatedAt)}</span>
                                </div>
                            </div>

                            <div class="my-report-actions">
                                <div>
                                    <label>Description</label>
                                    <textarea id="edit-desc-${r._id}" rows="3">${e(r.description || '')}</textarea>
                                </div>
                                <div>
                                    <label>City</label>
                                    <input id="edit-city-${r._id}" value="${e(r.city || '')}">
                                </div>
                                <div>
                                    <label>Classification</label>
                                    <input id="edit-class-${r._id}" value="${e(r.classification || '')}">
                                </div>
                                <div style="grid-column: 1 / -1;">
                                    <label>Update Request Message (for police review)</label>
                                    <textarea id="edit-reason-${r._id}" rows="2" placeholder="Write what changed and why this update should be approved..."></textarea>
                                </div>
                            </div>

                            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
                                <button class="btn btn-sm" onclick="saveReport('${r._id}')"><i class="fas fa-save"></i> Save Update</button>
                                <a class="btn btn-sm" href="/user/case.html?id=${r._id}"><i class="fas fa-eye"></i> Open Case</a>
                            </div>

                            <div class="my-report-requests" id="requests-${r._id}">
                                ${renderRequestHistory(requestMap[r._id])}
                            </div>

                            <div class="my-report-actions" style="margin-top:10px;">
                                <div>
                                    <label>Add Comment / Tip</label>
                                    <textarea id="note-msg-${r._id}" rows="2" placeholder="Write your update or tip..."></textarea>
                                </div>
                                <div>
                                    <label>Type</label>
                                    <select id="note-type-${r._id}">
                                        <option value="comment">Comment</option>
                                        <option value="tip">Tip</option>
                                    </select>
                                    <button class="btn btn-sm" style="margin-top:8px;" onclick="submitNote('${r._id}')"><i class="fas fa-paper-plane"></i> Add Note</button>
                                </div>
                            </div>

                            <div class="my-report-notes" id="notes-${r._id}"></div>
                        </article>
                    `;
                }).join('');

                reports.forEach((r) => loadNotes(r._id));
            } catch (err) {
                list.innerHTML = `<div class="error-state loading-full">Failed to load your reports: ${e(err.message)}</div>`;
            }
        }

        loadMyReports();
    </script>
</body>
</html>
