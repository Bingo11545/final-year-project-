<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="/index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">Find Missing <span class="highlight">Person</span></a>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
            <select id="languageSelector" onchange="changeLanguage(this.value)">
                <option value="en">🌐 English</option>
                <option value="am">🇪🇹 አማርኛ</option>
            </select>
        </div>
    </nav>

    <div class="auth-page-wrapper">
        <div class="form-card">
            <h2 data-key="reset_password">Reset Password</h2>
            <p class="subtitle" data-key="reset_update_button">Update Password</p>
            <form id="resetForm">
                <div class="form-group">
                    <label data-key="reset_new_password">New Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password" required style="padding-right:42px;">
                        <button type="button" onclick="togglePasswordVisibility('password', 'reset-password-eye')" aria-label="Show or hide new password" style="position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; padding:0;">
                            <i class="fas fa-eye" id="reset-password-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                 <div class="form-group">
                    <label data-key="reset_confirm_password">Confirm Password</label>
                    <div style="position:relative;">
                        <input type="password" id="confirmPassword" required style="padding-right:42px;">
                        <button type="button" onclick="togglePasswordVisibility('confirmPassword', 'reset-confirm-password-eye')" aria-label="Show or hide confirm password" style="position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; padding:0;">
                            <i class="fas fa-eye" id="reset-confirm-password-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" data-key="reset_update_button">Update Password</button>
            </form>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const lang = localStorage.getItem('preferredLanguage') || 'en';
        const t = (translations && translations[lang]) || translations.en;

        if (!token) {
            showToast(t.reset_invalid_token || 'Invalid or expired reset token.', 'error');
            window.location.href = '/index.html';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const t = getActiveTranslations();

            if (!isStrongPassword(password)) {
                showToast(t.auth_password_rule || getPasswordRuleMessage(), 'warning');
                return;
            }

            if (password !== confirmPassword) {
                showToast(t.reset_password_mismatch || 'Passwords do not match.', 'warning');
                return;
            }

            try {
                // Use token in URL parameter logic if backend endpoint was /resetpassword/:token
                // My apiCall helper sends JSON body.
                // The URL construction in apiCall is `${API_URL}${endpoint}`
                const data = await apiCall(`/auth/resetpassword/${token}`, 'POST', { password });
                showToast(t.reset_success_login || 'Password updated successfully. Please log in.', 'success');
                window.location.href = '/login.html';
            } catch (err) {
                showToast(localizeAuthMessage(err.message), 'error');
            }
        });
    </script>
</body>
</html>
