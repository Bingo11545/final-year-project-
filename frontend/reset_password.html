<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="/index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">Find Missing <span class="highlight">Person</span></a>
        </div>
        <select id="languageSelector" onchange="changeLanguage(this.value)" style="margin-right:20px; padding:5px; border:1px solid #ccc; font-size:0.8rem;">
            <option value="en">English</option>
            <option value="am">Amharic (አማርኛ)</option>
            <option value="om">Oromo (Afaan Oromoo)</option>
            <option value="ti">Tigrinya (ትግርኛ)</option>
            <option value="so">Somali (Soomaaliga)</option>
            <option value="af">Afar (Qafaraf)</option>
        </select>
    </nav>

    <div class="container" style="max-width: 400px;">
        <h2 data-key="reset_password">Reset Password</h2>
        <form id="resetForm">
            <div class="form-group">
                <label data-key="password">New Password</label>
                <input type="password" id="password" required>
            </div>
             <div class="form-group">
                <label data-key="confirm_password">Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn" data-key="reset_password">Update Password</button>
        </form>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Invalid token');
            window.location.href = '/index.html';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                // Use token in URL parameter logic if backend endpoint was /resetpassword/:token
                // My apiCall helper sends JSON body.
                // The URL construction in apiCall is `${API_URL}${endpoint}`
                const data = await apiCall(`/auth/resetpassword/${token}`, 'POST', { password });
                alert('Password updated! Please login.');
                window.location.href = '/login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
