<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">Find Missing <span class="highlight">Person</span></a>
        </div>
        <select id="languageSelector" onchange="changeLanguage(this.value)" style="margin-right:20px; padding:5px; border:1px solid #ccc; font-size:0.8rem;">
            <option value="en">English</option>
            <option value="am">Amharic (አማርኛ)</option>
            <option value="om">Oromo (Afaan Oromoo)</option>
            <option value="ti">Tigrinya (ትግርኛ)</option>
            <option value="so">Somali (Soomaaliga)</option>
            <option value="af">Afar (Qafaraf)</option>
        </select>
    </nav>

    <div class="container" style="max-width: 400px;">
        <h2 data-key="forgot_password">Forgot Password</h2>
        <form id="forgotForm">
            <div class="form-group">
                <label data-key="email">Enter your email address</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn" data-key="send_link">Send Reset Link</button>
        </form>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            try {
                const data = await apiCall('/auth/forgotpassword', 'POST', { email });
                alert(data.data || 'Email sent');
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
