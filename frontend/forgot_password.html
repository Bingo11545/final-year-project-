<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="/index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">Find Missing <span class="highlight">Person</span></a>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
            <select id="languageSelector" onchange="changeLanguage(this.value)">
                <option value="en">🌐 English</option>
                <option value="am">🇪🇹 አማርኛ</option>
            </select>
        </div>
    </nav>

    <div class="auth-page-wrapper">
        <div class="form-card">
            <h2 data-key="forgot_password">Forgot Password</h2>
            <p class="subtitle" data-key="forgot_email_prompt">Enter your email address</p>
            <form id="forgotForm">
                <div class="form-group">
                    <label data-key="email_label">Email</label>
                    <input type="email" id="email" data-placeholder-key="email_placeholder" placeholder="your@gmail.com" required>
                </div>
                <button type="submit" class="btn" data-key="send_link">Send Reset Link</button>
            </form>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const t = getActiveTranslations();
            if (!isValidGmail(email)) {
                showToast(t.auth_email_gmail_only || 'Email must end with @gmail.com', 'warning');
                return;
            }
            try {
                const data = await apiCall('/auth/forgotpassword', 'POST', { email });
                showToast(data.data || t.forgot_success_email_sent || 'Reset link sent to your email.', 'success');
            } catch (err) {
                showToast(localizeAuthMessage(err.message), 'error');
            }
        });
    </script>
</body>
</html>
