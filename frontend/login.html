<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Find Missing Person</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="theme.js"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-search-location" style="color:white; font-size:0.9rem;"></i></div>
            <a href="/index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:6px;">
                Find Missing <span class="highlight">Person</span>
            </a>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Switch to Light Mode" aria-label="Toggle theme">
                <i class="fas fa-sun"></i>
            </button>
            <select id="languageSelector" aria-label="Select Language">
                <option value="en">🌐 English</option>
                <option value="am">🇪🇹 አማርኛ</option>
            </select>
        </div>
    </nav>

    <div class="auth-page-wrapper">
        <div class="form-card">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:1rem; justify-content:flex-start;">
                <div style="width:42px; height:42px; background:linear-gradient(135deg,var(--accent-blue),var(--accent-teal)); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px var(--accent-blue-glow);">
                    <i class="fas fa-search-location" style="color:white; font-size:1rem;"></i>
                </div>
                <div style="font-family:'Outfit',sans-serif; font-weight:800; font-size:1.05rem;">Find Missing <span class="highlight">Person</span></div>
            </div>

            <!-- Login header -->
            <div style="text-align:left; margin-bottom:1.75rem;">
                <h2 data-key="login_title" style="margin-bottom:6px;">Login</h2>
                <p class="subtitle" style="color:var(--text-secondary); font-size:0.875rem; margin-top:0;" data-key="login_subtitle">Access the national registry system</p>
            </div>

            <div id="error-msg" style="display:none; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#f87171; padding:11px 15px; border-radius:8px; font-size:0.875rem; margin-bottom:1rem; animation:fadeIn 0.3s ease-out;" role="alert" aria-live="polite"></div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" data-key="email">Email</label>
                    <div style="position:relative;">
                        <i class="fas fa-envelope" style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; pointer-events:none; aria-hidden:true;"></i>
                        <input type="email" id="email" name="email" data-placeholder-key="email_placeholder" placeholder="your@email.com" required aria-label="Email address" aria-describedby="email-error" style="padding-left:38px;">
                        <div id="email-error" class="error-text" style="display:none;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password" data-key="password">Password</label>
                    <div style="position:relative;">
                        <i class="fas fa-key" style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.85rem; pointer-events:none; aria-hidden:true;"></i>
                        <input type="password" id="password" name="password" data-placeholder-key="password_placeholder" placeholder="••••••••" required aria-label="Password" aria-describedby="password-error" style="padding-left:38px;">
                        <div id="password-error" class="error-text" style="display:none;"></div>
                    </div>
                </div>
                <div style="text-align:right; margin-bottom:1.25rem; margin-top:-0.5rem;">
                    <a href="/forgot_password.html" style="font-size:0.8rem; color:var(--accent-teal); text-decoration:none;" data-key="forgot_password">Forgot Password?</a>
                </div>
                <button type="submit" id="submit-btn" class="btn" style="width:100%; justify-content:center;" aria-label="Login to your account">
                    <i class="fas fa-arrow-right-to-bracket" aria-hidden="true"></i>
                    <span data-key="login_title">Login</span>
                </button>
            </form>

            <div class="form-link">
                <span data-key="no_account">Don't have an account?</span>
                <a href="/register.html" data-key="register"> Register</a>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            const form = document.getElementById('loginForm');
            
            // Clear previous errors
            errEl.style.display = 'none';
            clearFormErrors(form);

            // Validate form
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            let isValid = true;
            if (!email) {
                document.getElementById('email-error').textContent = 'Email is required';
                document.getElementById('email-error').style.display = 'block';
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('email-error').textContent = 'Please enter a valid email';
                document.getElementById('email-error').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('email-error').style.display = 'none';
            }

            if (!password) {
                document.getElementById('password-error').textContent = 'Password is required';
                document.getElementById('password-error').style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('password-error').textContent = 'Password must be at least 6 characters';
                document.getElementById('password-error').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('password-error').style.display = 'none';
            }

            if (!isValid) {
                showToast('Please fix the errors below', 'error');
                return;
            }

            const lang = localStorage.getItem('preferredLanguage') || 'en';
            const t = (translations && translations[lang]) || translations.en;
            
            setButtonLoading(btn, t.signing_in || 'Signing in...');

            try {
                const data = await apiCall('/auth/login', 'POST', {
                    email,
                    password
                });
                localStorage.setItem('token', data.token);
                showToast('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = data.redirectPath || '/user/dashboard.html';
                }, 800);
            } catch (err) {
                errEl.textContent = err.message || 'Login failed. Please try again.';
                errEl.style.display = 'block';
                showToast(err.message, 'error');
                resetButtonLoading(btn);
            }
        });

        // Real-time validation
        document.getElementById('email').addEventListener('blur', function() {
            if (this.value && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)) {
                document.getElementById('email-error').style.display = 'none';
            }
        });

        document.getElementById('password').addEventListener('blur', function() {
            if (this.value && this.value.length >= 6) {
                document.getElementById('password-error').style.display = 'none';
            }
        });
    </script>
</body>
</html>
